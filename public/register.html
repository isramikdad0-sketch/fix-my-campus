<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Fix My Campus</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">
                <img src="images/logo.png" style="height: 30px;" alt="Logo">
                Fix My Campus
            </a>
            <div class="nav-links">
                <a href="/" class="btn btn-outline">Home</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Create Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Full Name</label>
                    <input type="text" id="username" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" class="form-control">
                        <option value="student">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group" id="adminCodeGroup" style="display: none;">
                    <label for="adminCode">Admin Secret Code</label>
                    <input type="password" id="adminCode" class="form-control" placeholder="Enter admin code">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
                Already have an account? <a href="/login.html" style="color: var(--primary); font-weight: 500;">Login
                    here</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
