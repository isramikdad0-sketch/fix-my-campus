<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#f4f9f9">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Fix My Campus</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">
                <img src="images/logo.png" style="height: 30px;" alt="Logo">
                Fix My Campus
            </a>
            <div class="nav-links">
                <a href="/login.html" class="btn btn-outline">Back to Login</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Reset Password</h2>
            <form id="resetForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-control" required placeholder="New password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" required
                        placeholder="Confirm new password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newPassword })
                });

                const data = await res.json();

                if (res.ok) {
                    alert('Password reset successful! Please login with your new password.');
                    window.location.href = '/login.html';
                } else {
                    alert(data.message || 'Reset failed');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred');
            }
        });
    </script>
</body>

</html>
