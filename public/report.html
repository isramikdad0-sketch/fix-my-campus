<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - Fix My Campus</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">
                <img src="images/logo.png" style="height: 30px;" alt="Logo">
                Fix My Campus
            </a>
            <div class="nav-links">
                <a href="/dashboard.html" class="btn btn-outline">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="complaint-container">
            <h2 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">Report
                an Issue</h2>
            <form id="complaintForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" class="form-control" required
                        placeholder="e.g. Broken Fan in Room 302">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" class="form-control" required>
                        <option value="">Select Category</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Water">Water</option>
                        <option value="Cleanliness">Cleanliness</option>
                        <option value="Infrastructure">Infrastructure</option>
                        <option value="Internet">Internet</option>
                        <option value="Safety">Safety</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" class="form-control" required
                        placeholder="e.g. Science Block, 2nd Floor">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-control" rows="4" required
                        placeholder="Describe the issue..."></textarea>
                </div>

                <div class="form-group">
                    <label for="image">Upload Image (Optional)</label>
                    <input type="file" id="image" class="form-control" accept="image/*">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Complaint</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/config.js"></script>
    <script src="js/report.js"></script>
</body>

</html>
