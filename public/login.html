<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#f4f9f9">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fix My Campus</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">
                <img src="images/logo.png" style="height: 30px;" alt="Logo">
                Fix My Campus
            </a>
            <div class="nav-links">
                <a href="/" class="btn btn-outline">Home</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/reset-password.html" style="font-size: 0.9rem; color: var(--text-light);">Forgot
                        Password?</a>
                </div>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
                Don't have an account? <a href="/register.html"
                    style="color: var(--primary); font-weight: 500;">Register here</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
